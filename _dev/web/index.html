<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F1115" />
  <title>·</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="bg-image"></div>
  <div id="bg-overlay"></div>

  <div class="phone">
    <div class="top-icons">
      <button class="icon-btn" id="settings-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      </button>
      <button class="icon-btn" id="history-btn" aria-label="History">
        <svg viewBox="0 0 24 24"><path d="M13,3c-4.97,0-9,4.03-9,9H1l3.89,3.89l0.07,0.14L9,12H6c0-3.87,3.13-7,7-7s7,3.13,7,7s-3.13,7-7,7 c-1.93,0-3.68-0.79-4.94-2.06l-1.42,1.42C8.27,19.99,10.51,21,13,21c4.97,0,9-4.03,9-9S17.97,3,13,3z M12,8v5l4.28,2.54l0.72-1.21 l-3.5-2.08V8H12z"/></svg>
      </button>
    </div>

    <div id="history-list" class="history-list"></div>

    <div class="bottom-anchor">
      <div class="lang-picker">
        <button class="chip" data-lang="en"><span class="flag">🇬🇧</span><span class="label">EN</span></button>
        <button class="chip" data-lang="id"><span class="flag">🇮🇩</span><span class="label">ID</span></button>
        <button class="chip" data-lang="su"><span class="flag">🏝</span><span class="label">SU</span></button>
      </div>

      <div class="combined-box">
        <div class="result-section">
          <div class="result-header">
            <span class="target-name">→ <span id="target-name">Indonesian</span></span>
            <span class="spinner" id="spinner" hidden></span>
            <span class="grow"></span>
            <button class="mini-btn" id="copy-result-btn" hidden aria-label="Copy">
              <svg viewBox="0 0 24 24"><path d="M16,1H4C2.9,1,2,1.9,2,3v14h2V3h12V1z M19,5H8C6.9,5,6,5.9,6,7v14c0,1.1,0.9,2,2,2h11c1.1,0,2-0.9,2-2V7C21,5.9,20.1,5,19,5z M19,21H8V7h11V21z"/></svg>
            </button>
          </div>
          <div class="result-body" id="result-body">Translation appears here</div>
          <div class="translate-btn-wrap" id="translate-btn-wrap" hidden>
            <button class="translate-btn" id="translate-btn">
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
              Translate
            </button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="input-row">
          <textarea
            id="source-input"
            class="source-input"
            placeholder="Type a message…"
            rows="1"
          ></textarea>
          <button class="mini-btn x-btn" id="clear-btn" hidden aria-label="Clear">
            <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41z"/></svg>
          </button>
          <button class="send-btn" id="send-btn" disabled aria-label="Send via WhatsApp">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings sheet -->
  <div class="sheet-backdrop" id="settings-sheet" hidden>
    <div class="sheet glass">
      <div class="sheet-header">
        <h2>Settings</h2>
        <button class="icon-btn close-btn" data-close="settings-sheet" aria-label="Close">
          <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41z"/></svg>
        </button>
      </div>
      <div class="sheet-body">

        <div class="ios-section-label">Translation</div>
        <div class="ios-group">
          <div class="ios-row">
            <div class="ios-row-content">
              <div class="ios-row-title">DeepL API key</div>
              <input type="password" id="deepl-key" placeholder="Paste your DeepL key" class="ios-row-input" />
            </div>
          </div>
          <div class="ios-row ios-row-tap" id="test-key-row">
            <div class="ios-row-content"><div class="ios-row-title accent">Test key</div></div>
          </div>
        </div>

        <div class="ios-section-label">Behavior</div>
        <div class="ios-group">
          <div class="ios-row">
            <div class="ios-row-content">
              <div class="ios-row-title">Auto-translate while typing</div>
              <div class="ios-row-hint">Off: tap Translate inside the result box.</div>
            </div>
            <input type="checkbox" id="auto-translate-toggle" checked />
          </div>
        </div>

        <div class="ios-section-label">WhatsApp</div>
        <div class="ios-group">
          <div class="ios-row">
            <div class="ios-row-content">
              <div class="ios-row-title">Default contact</div>
              <input type="tel" id="contact-number" placeholder="+62 812 3456 7890" class="ios-row-input" />
            </div>
          </div>
        </div>

        <div class="ios-section-label">Background</div>
        <div class="ios-group">
          <div class="ios-row">
            <label for="bg-file" class="ios-row-content ios-row-tap"><div class="ios-row-title accent">Choose image…</div></label>
            <input type="file" id="bg-file" accept="image/*" style="display:none" />
          </div>
          <div class="ios-row ios-row-tap" id="bg-clear">
            <div class="ios-row-content"><div class="ios-row-title danger">Remove image</div></div>
          </div>
        </div>

        <div class="ios-section-label">Colors</div>
        <div class="ios-group">
          <ColorPickerRow data-target="accent" data-label="Accent" data-alpha="false"></ColorPickerRow>
          <ColorPickerRow data-target="send" data-label="Send button" data-alpha="false"></ColorPickerRow>
          <ColorPickerRow data-target="copy" data-label="Copy button" data-alpha="false"></ColorPickerRow>
          <ColorPickerRow data-target="input" data-label="Message box" data-alpha="true"></ColorPickerRow>
        </div>

        <div class="ios-section-label" id="favorites-label" hidden>Favorites</div>
        <div class="ios-group" id="favorites-group" hidden></div>

        <div class="sheet-footer-spacer"></div>
      </div>
    </div>
  </div>

  <!-- History sheet -->
  <div class="sheet-backdrop" id="history-sheet" hidden>
    <div class="sheet glass">
      <div class="sheet-header">
        <h2>History</h2>
        <button class="icon-btn close-btn" data-close="history-sheet" aria-label="Close">
          <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41z"/></svg>
        </button>
      </div>
      <div class="filter-chips">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="fav">♥ Favorites</button>
      </div>
      <div class="sheet-body" id="history-sheet-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
